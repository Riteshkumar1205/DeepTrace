version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: deeptrace-db
    environment:
      POSTGRES_USER: deeptrace
      POSTGRES_PASSWORD: deeptrace_secure_pass
      POSTGRES_DB: deeptrace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deeptrace"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: deeptrace-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: deeptrace-mq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: minio/minio:RELEASE.2023-09-04T19-57-37Z
    container_name: deeptrace-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secure_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deeptrace-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://deeptrace:deeptrace_secure_pass@db:5432/deeptrace
      - SECRET_KEY=deeptrace-super-secret-key-32-chars-at-least-!!!
      - UPLOAD_DIR=/workspace/storage/uploads
      - REPORT_DIR=/workspace/storage/reports
    volumes:
      - ./backend:/workspace
      - backend_storage:/workspace/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deeptrace-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  backend_storage:
