[pytest]
testpaths = tests
addopts = -p no:cacheprovider
markers =
    unit: fast service and helper tests
    integration: multi-component API or DB tests
    security: security and abuse-case coverage
    adversarial: adversarial payload and evasion coverage
    forensics: forensic validation suites
    chain_of_custody: audit trail integrity suites
    blockchain: ledger and custody verification suites
    performance: bounded performance checks
    chaos: fault-injection and recovery checks
    regression: pinned regression scenarios
    data_integrity: hash and data consistency checks
    realtime: external reputation and OSINT adapter checks
    e2e: end-to-end browser validation checks
